<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <title localization-key="pageTitle"></title>
    <meta name="description" content="Ylitse web registration" />
    <meta name="author" content="SOS Children's Villages Finland" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/styles/shared-styles.css" />
    <link rel="stylesheet" href="/register/styles.css" />
    <link rel="icon" href="/static/favicon/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/static/favicon/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/static/favicon/apple-touch-icon.png" />
  </head>

  <body>
    <header id="mobile-header">
      <img src="/static/img/ylitse-logo-small-new.svg" alt="Ylitse" />
    </header>
    <main>
      <div id="language-buttons">
        <a id="fi-button" href="#" localization-key="inFinnish"></a>
        <span class="separator"></span>
        <a id="en-button" href="#" localization-key="inEnglish"></a>
      </div>
      <form id="register-form" name="register">
        <h1 localization-key="registerTitle"></h1>
        <p localization-key-html="description"></p>
        <h2 localization-key="accountInfoTitle"></h2>
        <p localization-key="requiredFieldInfo"></p>
        <fieldset id="username-field">
          <label for="username">
            <span localization-key="usernameLabel"></span>
            <span class="align-right">
              <span class="tooltip">
                <img src="/static/icons/tooltip.svg" alt="" />
                <span class="tooltip-text" localization-key="usernameTooltip">
                </span>
              </span>
            </span>
          </label>
          <input
            id="username"
            name="username"
            type="text"
            maxlength="100"
            minlength="2"
            pattern=".{2,100}"
            onblur="checkInput('username')"
            aria-describedby="username-error"
            required
          />
          <div class="error-message" id="username-error" role="alert">
            <img src="/static/icons/warning-with-background.svg" alt="" />
            <span
              id="too-short-message"
              localization-key="usernameTooShortError"
            >
            </span>
            <span id="taken-message" localization-key="usernameTakenError">
            </span>
            <span id="try-again-message" localization-key="tryAgainMessage">
            </span>
          </div>
        </fieldset>
        <fieldset id="password-field">
          <label for="password">
            <span localization-key="passwordLabel"></span>
            <span class="align-right">
              <button
                id="show-password"
                class="password-toggle"
                type="button"
                onclick="togglePassword('password', true)"
                aria-controls="password"
                localization-key-aria-label="showPassword"
              >
                <img src="/static/icons/eye.svg" alt="" class="eye-icon" />
                <span localization-key="showPassword"></span>
              </button>
              <button
                id="hide-password"
                class="password-toggle"
                type="button"
                onclick="togglePassword('password', false)"
                aria-controls="password"
                localization-key-aria-label="hidePassword"
              >
                <img src="/static/icons/eye.svg" alt="" class="eye-icon" />
                <span localization-key="hidePassword"></span>
              </button>
              <span class="tooltip">
                <img src="/static/icons/tooltip.svg" alt="" />
                <span
                  class="tooltip-text"
                  localization-key="passwordTooltip"
                ></span>
              </span>
            </span>
          </label>
          <input
            id="password"
            name="password"
            type="password"
            maxlength="100"
            minlength="8"
            pattern=".{8,100}"
            onblur="checkInput('password')"
            aria-describedby="password-error"
            required
          />
          <div class="error-message" id="password-error" role="alert">
            <img src="/static/icons/warning-with-background.svg" alt="" />
            <span localization-key="passwordTooShortError"></span>
          </div>
        </fieldset>
        <fieldset id="password-confirmation-field">
          <label for="password-confirmation">
            <span localization-key="passwordConfirmationLabel"></span>
            <span class="align-right">
              <button
                id="show-password-confirmation"
                class="password-toggle"
                type="button"
                onclick="togglePassword('password-confirmation', true)"
                aria-controls="password-confirmation"
                localization-key-aria-label="showPassword"
              >
                <img src="/static/icons/eye.svg" alt="" class="eye-icon" />
                <span localization-key="showPassword"></span>
              </button>
              <button
                id="hide-password-confirmation"
                class="password-toggle"
                type="button"
                onclick="togglePassword('password-confirmation', false)"
                aria-controls="password-confirmation"
                localization-key-aria-label="hidePassword"
              >
                <img src="/static/icons/eye.svg" alt="" class="eye-icon" />
                <span localization-key="hidePassword"></span>
              </button>
              <span class="tooltip">
                <img src="/static/icons/tooltip.svg" alt="" />
                <span class="tooltip-text" localization-key="passwordTooltip">
                </span>
              </span>
            </span>
          </label>
          <input
            id="password-confirmation"
            name="password-confirmation"
            type="password"
            maxlength="100"
            onblur="checkInput('password-confirmation')"
            aria-describedby="password-confirmation-error"
            required
          />
          <div
            class="error-message"
            id="password-confirmation-error"
            role="alert"
          >
            <img src="/static/icons/warning-with-background.svg" alt="" />
            <span localization-key="passwordsDontMatchError"></span>
          </div>
        </fieldset>
        <fieldset id="email-field">
          <label for="email" localization-key="emailLabel"></label>
          <input
            id="email"
            name="email"
            type="email"
            maxlength="200"
            onblur="checkInput('email')"
            pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$"
            aria-describedby="email-error"
          />
          <div class="error-message" id="email-error" role="alert">
            <img src="/static/icons/warning-with-background.svg" alt="" />
            <span localization-key="emailError"> </span>
          </div>
          <p class="field-info" localization-key="emailFieldInfo"></p>
        </fieldset>
        <fieldset id="display-name-field">
          <label for="display-name">
            <span localization-key="displayNameLabel"></span>
            <span class="align-right">
              <span class="tooltip">
                <img src="/static/icons/tooltip.svg" alt="" />
                <span
                  class="tooltip-text"
                  localization-key="displayNameTooltip"
                >
                </span>
              </span>
            </span>
          </label>
          <input
            id="display-name"
            name="display-name"
            type="text"
            maxlength="30"
            minlength="2"
            pattern=".{2,30}"
            onblur="checkInput('display-name')"
            aria-describedby="display-name-error"
            required
          />
          <div class="error-message" id="display-name-error" role="alert">
            <img src="/static/icons/warning-with-background.svg" alt="" />
            <span localization-key="displayNameTooShortError"></span>
          </div>
          <p class="field-info" localization-key="displayNameFieldInfo"></p>
        </fieldset>
        <h2 localization-key="privacyTitle"></h2>
        <section>
          <p localization-key="privacyParagraph1"></p>
          <p localization-key="privacyParagraph2"></p>
          <p localization-key-html="privacyParagraph3"></p>
        </section>
        <fieldset class="switch-line">
          <label class="switch">
            <input
              id="required-age"
              type="checkbox"
              onchange="checkForm()"
              required
            />
            <span class="slider"></span>
          </label>
          <label
            for="required-age"
            class="switch-label"
            localization-key="requiredAgeSwitch"
          >
          </label>
        </fieldset>
        <fieldset class="switch-line">
          <label class="switch">
            <input
              id="privacy-consent"
              type="checkbox"
              onchange="checkForm()"
              required
            />
            <span class="slider"></span>
          </label>
          <label
            for="privacy-consent"
            class="switch-label"
            localization-key="privacyConsentSwitch"
          >
          </label>
        </fieldset>
        <button
          id="submit"
          type="submit"
          disabled
          localization-key="registerButton"
        ></button>
      </form>
    </main>
    <footer id="register-footer">
      <p localization-key="footer"></p>
    </footer>
    <script src="/register/index.js"></script>
    <script src="/static/localization.js"></script>
  </body>
</html>
